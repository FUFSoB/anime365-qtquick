name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-desktop:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: Anime365
          - os: windows-latest
            artifact: Anime365.exe
          - os: macos-latest
            artifact: Anime365

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Install objdump (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y binutils

      - name: Install Qt dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y \
            libglib2.0-0 libfontconfig1 libfreetype6 libgl1 \
            libxkbcommon0 libdbus-1-3 libxcb1 libx11-6 \
            libxcb-cursor0 libxcb-keysyms1 libxcb-image0 \
            libxcb-render-util0 libxcb-shape0 libegl1

      - name: Build
        run: uv run --group build python build.py desktop --onefile --clean

      - uses: actions/upload-artifact@v7
        with:
          name: Anime365-${{ runner.os }}
          path: dist/${{ matrix.artifact }}

  # Android CI is disabled: PySide6 does not publish prebuilt Android wheels
  # on PyPI. Building from source requires the full Qt for Android SDK and
  # cross-compilation, which is impractical in CI. Re-enable when upstream
  # starts shipping android_aarch64 wheels.

  release:
    needs: [build-desktop]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: false

      - name: Rename artifacts
        run: |
          mv artifacts/Anime365-Linux/Anime365         artifacts/Anime365-linux
          mv artifacts/Anime365-Windows/Anime365.exe   artifacts/Anime365-windows.exe
          mv artifacts/Anime365-macOS/Anime365         artifacts/Anime365-macos

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" artifacts/Anime365-linux artifacts/Anime365-windows.exe artifacts/Anime365-macos --generate-notes

  patch:
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Install xdelta3
        run: sudo apt-get install -y xdelta3

      - name: Find previous release tag
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prev=$(gh release list --repo "${{ github.repository }}" --limit 10 \
            --json tagName,isDraft,isPrerelease \
            --jq '[.[] | select(.isDraft == false and .isPrerelease == false) | .tagName] | .[1]')
          echo "tag=$prev" >> "$GITHUB_OUTPUT"

      - name: Download previous release artifacts
        if: steps.prev.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p previous
          gh release download "${{ steps.prev.outputs.tag }}" \
            --repo "${{ github.repository }}" --dir previous || true

      - name: Download current release artifacts
        if: steps.prev.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p current
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" --dir current

      - name: Create binary patches
        if: steps.prev.outputs.tag != ''
        run: |
          for platform in linux macos; do
            old="previous/Anime365-$platform"
            new="current/Anime365-$platform"
            if [ -f "$old" ] && [ -f "$new" ]; then
              xdelta3 -e -s "$old" "$new" "current/Anime365-$platform.patch"
              echo "Created patch for $platform"
            fi
          done
          if [ -f previous/Anime365-windows.exe ] && [ -f current/Anime365-windows.exe ]; then
            xdelta3 -e -s previous/Anime365-windows.exe current/Anime365-windows.exe \
              current/Anime365-windows.exe.patch
            echo "Created patch for windows"
          fi

      - name: Upload patches to release
        if: steps.prev.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          patches=$(ls current/*.patch 2>/dev/null || true)
          if [ -n "$patches" ]; then
            gh release upload "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" $patches
          else
            echo "No patches generated (previous binaries not found)"
          fi

